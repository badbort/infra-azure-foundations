resource_groups:
  hackathon-2026:
    location: Australia East
    user_assigned_identities:
      - name: github-actions-hackathon-spec-driven
        federated_credentials:
          - name: gh-branch-main-fic
            type: github
            entity: Branch
            organization: racwasandbox
            repository: hackathon-spec-driven
            branch: main
          - name: gh-env-infra-fic
            type: github
            entity: Environment
            organization: racwasandbox
            repository: hackathon-spec-driven
            environment: infra
      - name: id-hackathon-2026-main
      - name: github-actions-hackathon-spec-driven-integration-tests
        federated_credentials:
          - name: gh-branch-main-fic
            type: github
            entity: Branch
            organization: racwasandbox
            repository: hackathon-spec-driven
            branch: main
      
    role_assignments:
      - group: Me
        roles:
          - Contributor
          - Azure Service Bus Data Owner
          - Key Vault Secrets Officer
          - User Access Administrator
          - Storage Account Contributor
          - Storage Blob Data Owner
          - Storage Table Data Contributor
          - Storage Queue Data Contributor
      - service_principal: github-actions-hackathon-spec-driven-integration-tests
        description: Seems to need reader to see subscription for azure/login action
        roles:
          - Reader
      - service_principal: github-actions-hackathon-spec-driven
        roles:
          - Contributor
          - User Access Administrator
      - service_principal: id-hackathon-2026-main
        roles:
          - Azure Service Bus Data Owner
          - Storage Blob Data Owner
          - Key Vault Secrets User
          - Storage Table Data Contributor
          - Storage Queue Data Contributor
          - Storage Account Contributor
