name: Pulumi Preview

on:
  - pull_request
  
permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    environment: infra
    env:
      WORK_DIR: ./src/BadBort.AzureRm.Foundation.Infra
    steps:
      - run: |
          echo ${{vars.BACKEND_CONTAINER_NAME}}
          
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: azure/login@v2
        name: Azure OIDC login
        with:
          allow-no-subscriptions: true
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
          
      - name: Pulumi login to azblob backend (Tenant A)
        run: pulumi login "azblob://${{ env.BACKEND_CONTAINER_NAME }}?storage_account=${{ env.BACKEND_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.WORK_DIR }}
          
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: az-subscription-foundations
          config-map: |
            data_dir: data
            tenant: adi
            
          comment-on-pr: true
          comment-on-summary: trur
#          cloud-url: azblob://my-blob-name-and-path
        #env:
          #PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          #PULUMI_BACKEND_URL: ${{ secrets.PULUMI_BACKEND_URL }}