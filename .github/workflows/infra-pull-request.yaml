name: Pulumi Preview

on:
  - pull_request
  
permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  preview:
    name: Preview
    runs-on: ubuntu-latest
    environment: infra
    env:
      WORK_DIR: ./src/BadBort.AzureRm.Foundation.Infra
      PULUMI_STACK: adi-tenant
    steps:
      - run: |
          echo "backend container name: ${{vars.BACKEND_CONTAINER_NAME}}"
          
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: azure/login@v2
        name: Azure OIDC login
        with:
          allow-no-subscriptions: true
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} 
          
#      - name: Retrieve passphrase from Key Vault
#        id: keyvault
#        uses: azure/acli@v2
#        with:
#          azcliversion: latest
#          inlineScript: |
#            secretValue=$(az keyvault secret show --name "infra-azure-foundations-stack-adi-tenant" --vault-name "kv-badbort-pulumi-pw" --query value -o tsv)
#            echo "::add-mask::$secretValue"
#            echo "PULUMI_CONFIG_PASSPHRASE=$secretValue" >> $GITHUB_ENV
          
      - name: Pulumi login to azblob backend (Tenant A)
        run: pulumi login "azblob://${{vars.BACKEND_CONTAINER_NAME }}?storage_account=${{vars.BACKEND_STORAGE_ACCOUNT }}"
        working-directory: ${{ env.WORK_DIR }}

      - name: Pulumi Stack Init
        run: |
          pulumi stack select --stack ${{ env.PULUMI_STACK }} --create --secrets-provider azurekeyvault://kv-badbort-pulumi-pw.vault.azure.net/keys/test
          
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: ${{ env.WORK_DIR }}
          config-map: |
            data_dir: ${{ github.workspace }}/data
            tenant: adi
          comment-on-pr: true
          comment-on-summary: true
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ env.PULUMI_CONFIG_PASSPHRASE }}
